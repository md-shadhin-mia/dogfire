<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Monitor</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        .header h1 {
            font-size: 24px;
            color: #fff;
        }
        .status {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }
        .status-dot.active {
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .display {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        #monitor {
            display: block;
            width: 100%;
            cursor: crosshair;
        }
        .action {
            display: flex;
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #0c0c0c6b;
            color: wheat;
            pointer-events: none;
        }
        .action .type{
            display: none;
            background: #000000A1;
            padding: 8px;
            margin: auto;
            color: rgb(255, 255, 255);
        }
        .action .type.active{
            display: block;
        }
        .controls {
            margin-top: 20px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        .controls h3 {
            margin-bottom: 15px;
            color: #fff;
        }
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .control-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-item label {
            font-size: 12px;
            color: #aaa;
        }
        .control-item input {
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
        }
        .control-item input:focus {
            outline: none;
            border-color: #4caf50;
        }
        .btn {
            padding: 10px 20px;
            background: #4caf50;
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
        }
        .btn:hover {
            background: #45a049;
        }
        .btn.secondary {
            background: #2196f3;
        }
        .btn.secondary:hover {
            background: #1976d2;
        }
        .changes-log {
            margin-top: 20px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        .changes-log h3 {
            margin-bottom: 10px;
            color: #fff;
        }
        .change-entry {
            padding: 8px;
            background: #1a1a1a;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖥️ Screen Monitor</h1>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot" id="monitorStatus"></div>
                    <span id="statusText">Connecting...</span>
                </div>
                <div class="status-item">
                    <span>Changes:</span>
                    <span id="changeCount">0</span>
                </div>
            </div>
        </div>

        <div class="display">
            <canvas id="monitor">
                <div class="loading">Loading screen...</div>
            </canvas>
            <div class="action">
                <div class="type"></div>
            </div>
        </div>

        <div class="controls">
            <h3>⚙️ Monitor Configuration</h3>
            <div class="control-grid">
                <div class="control-item">
                    <label>Grid Size (downsampling)</label>
                    <input type="number" id="gridSize" min="1" max="16" value="4">
                </div>
                <div class="control-item">
                    <label>Color Threshold</label>
                    <input type="number" id="threshold" min="0" max="100" value="10">
                </div>
                <div class="control-item">
                    <label>Min Changes</label>
                    <input type="number" id="minChanges" min="1" max="100" value="1">
                </div>
                <div class="control-item">
                    <label>Sleep Time (μs)</label>
                    <input type="number" id="sleepTime" min="10000" max="100000" value="40000">
                </div>
            </div>
            <button class="btn" id="applyConfig">Apply Configuration</button>
            <button class="btn secondary" id="refreshStatus">Refresh Status</button>
        </div>

        <div class="changes-log">
            <h3>📊 Change Detection Log</h3>
            <div id="changesList"></div>
        </div>
    </div>
</body>
    <script>
        var monitor = document.getElementById("monitor");
        var actionType = document.querySelector('.type');
        var ctx = monitor.getContext('2d');
        var statusDot = document.getElementById('monitorStatus');
        var statusText = document.getElementById('statusText');
        var changeCountEl = document.getElementById('changeCount');
        var changesList = document.getElementById('changesList');

        let blob;
        let img;
        let totalChanges = 0;

        async function loadMonitorConfig() {
            try {
                let respo = await fetch("/monitor/status");
                let data = await respo.json();
                if (data.config) {
                    document.getElementById('gridSize').value = data.config.gridSize;
                    document.getElementById('threshold').value = data.config.threshold;
                    document.getElementById('minChanges').value = data.config.minChanges;
                    document.getElementById('sleepTime').value = data.config.sleepTime;
                }
                updateStatus(data.running);
            } catch (e) {
                console.error('Failed to load config:', e);
            }
        }

        function updateStatus(isRunning) {
            if (isRunning) {
                statusDot.classList.add('active');
                statusText.textContent = 'Monitoring';
            } else {
                statusDot.classList.remove('active');
                statusText.textContent = 'Disconnected';
            }
        }

        async function updateConfig() {
            const config = {
                gridSize: document.getElementById('gridSize').value,
                threshold: document.getElementById('threshold').value,
                minChanges: document.getElementById('minChanges').value,
                sleepTime: document.getElementById('sleepTime').value
            };

            try {
                let respo = await fetch(`/monitor/config?gridSize=${config.gridSize}&threshold=${config.threshold}&minChanges=${config.minChanges}&sleepTime=${config.sleepTime}`);
                let data = await respo.json();
                if (data.success) {
                    alert('Configuration updated successfully');
                    loadMonitorConfig();
                }
            } catch (e) {
                console.error('Failed to update config:', e);
                alert('Failed to update configuration');
            }
        }

        async function loadit(){
            try {
                let respo = await fetch("/image");
                blob = await respo.blob();
                img = new Image();
                img.onload = () =>{
                    monitor.width = img.width;
                    monitor.height = img.height;
                    ctx.drawImage(img, 0, 0);
                }
                img.src = URL.createObjectURL(blob);
            } catch (e) {
                console.error('Failed to load image:', e);
            }
        }

        async function loadpart(x, y, w, h){
            try {
                let respo = await fetch(`/imagepart/${x}/${y}/${w}/${h}`);
                blob = await respo.blob();
                img = new Image();
                img.onload = () =>{
                    ctx.drawImage(img, x, y);
                }
                img.src = URL.createObjectURL(blob);
            } catch (e) {
                console.error('Failed to load part:', e);
            }
        }

        async function checkChange(){
            try {
                let respo = await fetch("ischage");
                let jres = await respo.json();
                if (jres.length != 0){
                    console.log(jres);
                    totalChanges += jres.length;
                    changeCountEl.textContent = totalChanges;

                    for(let i = 0; i < jres.length; i++){
                        await loadpart(jres[i].point.x, jres[i].point.y, jres[i].to.w, jres[i].to.h);
                        addChangeLog(jres[i]);
                    }
                }
            } catch (e) {
                console.error('Failed to check changes:', e);
            }
            setTimeout(checkChange, 1000);
        }

        function addChangeLog(change) {
            const entry = document.createElement('div');
            entry.className = 'change-entry';
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${change.pixel} changes at (${change.point.x}, ${change.point.y}) size: ${change.to.w}x${change.to.h}`;
            changesList.insertBefore(entry, changesList.firstChild);

            if (changesList.children.length > 50) {
                changesList.removeChild(changesList.lastChild);
            }
        }

        document.getElementById('applyConfig').addEventListener('click', updateConfig);
        document.getElementById('refreshStatus').addEventListener('click', loadMonitorConfig);

        monitor.addEventListener("click", (e)=>{
            console.log(e.offsetX, e.offsetY);
            fetch(`click/${e.offsetX}/${e.offsetY}`);
        });

        monitor.addEventListener("contextmenu", (e)=>{
            e.preventDefault();
            console.log(e.offsetX, e.offsetY);
            fetch(`rightclick/${e.offsetX}/${e.offsetY}`);
        });

        var keytime = null;
        document.onkeypress = (e)=>{
            clearTimeout(keytime);
            actionType.innerText += e.key;
            actionType.classList.add('active');
            keytime = setTimeout(()=>{
                fetch(`/typekey/${actionType.innerText}`)
                actionType.classList.remove('active');
                actionType.innerText = "";
            }, 2000)
        }

        loadMonitorConfig();
        checkChange();
        loadit();
    </script>
</html>
